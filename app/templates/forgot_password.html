<!DOCTYPE html>
<html lang="{{ locale|default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('auth.forgot_password_title') }} — {{ t('app.name') }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;
      background:linear-gradient(135deg,#0f0c29 0%,#1e1553 25%,#2d2463 50%,#1a2a6c 75%,#0d1b4b 100%) fixed;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,.9);padding:1rem;
    }
    .card{
      width:100%;max-width:420px;padding:2.5rem 2rem;border-radius:1.25rem;
      background:rgba(255,255,255,.07);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.12);
      animation:fadeIn .5s ease-out;
    }
    .brand{
      font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
      font-weight:700;font-size:1.5rem;letter-spacing:-.02em;
      margin-bottom:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;
    }
    .brand img{width:1.75rem;height:1.75rem;border-radius:.375rem}
    h1{
      font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
      font-size:1.125rem;font-weight:600;text-align:center;
      color:rgba(255,255,255,.75);margin-bottom:.5rem;
    }
    .subtitle{
      text-align:center;font-size:.875rem;color:rgba(255,255,255,.5);
      margin-bottom:1.75rem;line-height:1.5;
    }
    .form-group{margin-bottom:1rem}
    label{display:block;font-size:.8125rem;font-weight:500;color:rgba(255,255,255,.7);margin-bottom:.375rem}
    input[type="email"]{
      width:100%;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.15);
      border-radius:.75rem;color:#fff;
      padding:.75rem 1rem;font-size:.9375rem;
      font-family:inherit;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus{
      border-color:rgba(165,180,252,.6);
      box-shadow:0 0 0 3px rgba(165,180,252,.15);
    }
    input.error{border-color:rgba(239,68,68,.5)}
    input::placeholder{color:rgba(255,255,255,.3)}
    .error-msg{
      display:none;font-size:.8125rem;color:#fca5a5;
      background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);
      border-radius:.75rem;padding:.625rem .875rem;margin-bottom:1rem;
      line-height:1.5;word-break:break-word;
    }
    .success-msg{
      display:none;font-size:.9375rem;color:#86efac;
      background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);
      border-radius:.75rem;padding:1.25rem;margin-bottom:1rem;
      line-height:1.6;text-align:center;
    }
    .success-msg .check{
      display:block;font-size:2rem;margin-bottom:.5rem;
    }
    .btn-primary{
      width:100%;padding:.75rem;border:none;border-radius:.75rem;
      font-size:.9375rem;font-weight:600;font-family:inherit;color:#fff;cursor:pointer;
      background:linear-gradient(135deg,rgba(99,102,241,.82),rgba(139,92,246,.82));
      border:1px solid rgba(139,92,246,.42);
      transition:filter .18s,transform .12s;margin-top:.25rem;
    }
    .btn-primary:hover:not(:disabled){filter:brightness(1.18);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .back-link{
      display:block;text-align:center;margin-top:1.5rem;
      font-size:.875rem;color:rgba(165,180,252,.8);text-decoration:none;
    }
    .back-link:hover{color:#a5b4fc;text-decoration:underline}
    .spinner{
      display:inline-block;width:1rem;height:1rem;
      border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
      border-radius:50%;animation:spin .6s linear infinite;
      vertical-align:middle;margin-right:.375rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/static/images/logo-mark.webp" alt="">
      {{ t('app.name') }}
    </div>
    <h1>{{ t('auth.forgot_password_title') }}</h1>
    <p class="subtitle">{{ t('auth.forgot_password_subtitle') }}</p>

    <div class="error-msg" id="error"></div>
    <div class="success-msg" id="success">
      <span class="check">&#10003;</span>
      <span id="successText"></span>
    </div>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label for="email">{{ t('auth.email_label') }}</label>
        <input type="email" id="email" name="email" autocomplete="email" required
               placeholder="you@example.com">
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">{{ t('auth.send_reset_link') }}</button>
    </form>

    <a href="/auth/login" class="back-link">&#8592; {{ t('auth.back_to_login') }}</a>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const errorEl = document.getElementById('error');
    const successEl = document.getElementById('success');
    const successText = document.getElementById('successText');
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('email');

    function showError(msg) {
      successEl.style.display = 'none';
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function hideError() { errorEl.style.display = 'none'; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      emailInput.classList.remove('error');

      const email = emailInput.value.trim();
      if (!email) { emailInput.classList.add('error'); showError('{{ t("auth.email_required") }}'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { emailInput.classList.add('error'); showError('{{ t("auth.email_invalid") }}'); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>{{ t("auth.sending_reset_link") }}';

      try {
        const resp = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          showError(data.detail || '{{ t("auth.sign_in_failed") }}');
          submitBtn.disabled = false;
          submitBtn.textContent = '{{ t("auth.send_reset_link") }}';
          return;
        }
        form.style.display = 'none';
        successText.textContent = '{{ t("auth.reset_email_sent") }}';
        successEl.style.display = 'block';
      } catch (err) {
        showError('{{ t("auth.sign_in_failed") }}');
        submitBtn.disabled = false;
        submitBtn.textContent = '{{ t("auth.send_reset_link") }}';
      }
    });
  </script>
</body>
</html>
