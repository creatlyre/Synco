<!DOCTYPE html>
<html lang="{{ locale|default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('auth.login_title') }} — {{ t('app.name') }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;
      background:linear-gradient(135deg,#0f0c29 0%,#1e1553 25%,#2d2463 50%,#1a2a6c 75%,#0d1b4b 100%) fixed;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,.9);padding:1rem;
    }
    .card{
      width:100%;max-width:420px;padding:2.5rem 2rem;border-radius:1.25rem;
      background:rgba(255,255,255,.07);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.12);
      animation:fadeIn .5s ease-out;
    }
    .brand{
      font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
      font-weight:700;font-size:1.5rem;letter-spacing:-.02em;
      margin-bottom:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;
    }
    .brand img{width:1.75rem;height:1.75rem;border-radius:.375rem}
    .tagline{text-align:center;font-size:.875rem;color:rgba(255,255,255,.5);margin-bottom:1.5rem;letter-spacing:.01em}
    h1{
      font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
      font-size:1.125rem;font-weight:600;text-align:center;
      color:rgba(255,255,255,.75);margin-bottom:1.75rem;
    }
    .form-group{margin-bottom:1rem}
    label{display:block;font-size:.8125rem;font-weight:500;color:rgba(255,255,255,.7);margin-bottom:.375rem}
    .input-wrap{position:relative}
    input[type="email"],input[type="password"],input[type="text"]{
      width:100%;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.15);
      border-radius:.75rem;color:#fff;
      padding:.75rem 1rem;font-size:.9375rem;
      font-family:inherit;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus{
      border-color:rgba(165,180,252,.6);
      box-shadow:0 0 0 3px rgba(165,180,252,.15);
    }
    input.error{border-color:rgba(239,68,68,.5)}
    input::placeholder{color:rgba(255,255,255,.3)}
    .toggle-pw{
      position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
      background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;
      padding:.25rem;font-size:.8125rem;
    }
    .toggle-pw:hover{color:rgba(255,255,255,.7)}
    .forgot-row{text-align:right;margin-top:.375rem}
    .forgot-row a{font-size:.8125rem;color:rgba(165,180,252,.8);text-decoration:none}
    .forgot-row a:hover{color:#a5b4fc;text-decoration:underline}
    .error-msg{
      display:none;font-size:.8125rem;color:#fca5a5;
      background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);
      border-radius:.75rem;padding:.625rem .875rem;margin-bottom:1rem;
      line-height:1.5;word-break:break-word;
    }
    .success-msg{
      display:none;font-size:.8125rem;color:#86efac;
      background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);
      border-radius:.75rem;padding:.625rem .875rem;margin-bottom:1rem;
      line-height:1.5;
    }
    .btn-primary{
      width:100%;padding:.75rem;border:none;border-radius:.75rem;
      font-size:.9375rem;font-weight:600;font-family:inherit;color:#fff;cursor:pointer;
      background:linear-gradient(135deg,rgba(99,102,241,.82),rgba(139,92,246,.82));
      border:1px solid rgba(139,92,246,.42);
      transition:filter .18s,transform .12s;margin-top:.25rem;
    }
    .btn-primary:hover:not(:disabled){filter:brightness(1.18);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .divider{
      display:flex;align-items:center;gap:.75rem;
      margin:1.25rem 0;color:rgba(255,255,255,.35);font-size:.8125rem;
    }
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12)}
    .btn-google{
      width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;
      padding:.75rem;border-radius:.75rem;font-size:.9375rem;
      font-weight:500;font-family:inherit;color:rgba(255,255,255,.9);cursor:pointer;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.18);
      transition:background .2s,border-color .2s;text-decoration:none;
    }
    .btn-google:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.28)}
    .btn-google svg{width:1.125rem;height:1.125rem;flex-shrink:0}
    .bottom-text{
      text-align:center;margin-top:1.5rem;font-size:.875rem;color:rgba(255,255,255,.5);
    }
    .bottom-text a{color:rgba(165,180,252,.8);text-decoration:none;font-weight:500}
    .bottom-text a:hover{color:#a5b4fc;text-decoration:underline}
    .spinner{
      display:inline-block;width:1rem;height:1rem;
      border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
      border-radius:50%;animation:spin .6s linear infinite;
      vertical-align:middle;margin-right:.375rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/static/images/logo-mark.webp" alt="">
      {{ t('app.name') }}
    </div>
    <p class="tagline">{{ t('auth.tagline') }}</p>
    <h1>{{ t('auth.login_title') }}</h1>

    <div class="error-msg" id="error"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">{{ t('auth.email_label') }}</label>
        <input type="email" id="email" name="email" autocomplete="email" required
               placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">{{ t('auth.password_label') }}</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password"
                 required minlength="6">
          <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePw(this)">&#9673;</button>
        </div>
        <div class="forgot-row">
          <a href="/auth/forgot-password">{{ t('auth.forgot_password_link') }}</a>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">{{ t('auth.sign_in_button') }}</button>
    </form>

    <div class="divider">{{ t('auth.or_divider') }}</div>

    <a href="/auth/login?provider=google" class="btn-google">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      {{ t('auth.continue_with_google') }}
    </a>

    <div class="bottom-text">
      {{ t('auth.no_account') }} <a href="/auth/register">{{ t('auth.sign_up_link') }}</a>
    </div>
  </div>

  <script>
    function togglePw(btn) {
      const inp = btn.parentElement.querySelector('input');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('email');
    const pwInput = document.getElementById('password');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function hideError() { errorEl.style.display = 'none'; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      emailInput.classList.remove('error');
      pwInput.classList.remove('error');

      const email = emailInput.value.trim();
      const password = pwInput.value;

      if (!email) { emailInput.classList.add('error'); showError('{{ t("auth.email_required") }}'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { emailInput.classList.add('error'); showError('{{ t("auth.email_invalid") }}'); return; }
      if (!password) { pwInput.classList.add('error'); showError('{{ t("auth.password_required") }}'); return; }
      if (password.length < 6) { pwInput.classList.add('error'); showError('{{ t("auth.password_min_length") }}'); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>{{ t("auth.signing_in_progress") }}';

      try {
        const resp = await fetch('/auth/password-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          showError(data.detail || '{{ t("auth.sign_in_failed") }}');
          submitBtn.disabled = false;
          submitBtn.textContent = '{{ t("auth.sign_in_button") }}';
          return;
        }
        window.location.href = '/dashboard';
      } catch (err) {
        showError('{{ t("auth.sign_in_failed") }}');
        submitBtn.disabled = false;
        submitBtn.textContent = '{{ t("auth.sign_in_button") }}';
      }
    });
  </script>
</body>
</html>
