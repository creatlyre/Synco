<form id="event-form" class="space-y-3" onsubmit="return submitEventForm(event)">
    <input id="event-id" type="hidden" />
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Title</label>
        <input id="event-title" required class="glass-input" />
    </div>
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Description</label>
        <textarea id="event-description" class="glass-input" rows="2" style="resize:vertical"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-2">
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Start</label>
            <input id="event-start" type="datetime-local" required class="glass-input" />
        </div>
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">End</label>
            <input id="event-end" type="datetime-local" required class="glass-input" />
        </div>
    </div>
    <div class="grid grid-cols-2 gap-2">
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Repeat</label>
            <select id="event-repeat" class="glass-input">
                <option value="">No repeat</option>
                <option value="DAILY">Daily</option>
                <option value="WEEKLY">Weekly</option>
                <option value="MONTHLY">Monthly</option>
                <option value="YEARLY">Yearly</option>
            </select>
        </div>
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Repeat count</label>
            <input id="event-repeat-count" type="number" min="1" class="glass-input" placeholder="e.g. 10" />
        </div>
    </div>
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Repeat until (optional)</label>
        <input id="event-repeat-until" type="date" class="glass-input" />
    </div>
    <div class="flex gap-2">
        <button type="submit" class="glass-btn-primary rounded-xl px-4 py-2 text-sm font-medium">Save Event</button>
        <button type="button" class="glass-btn-secondary rounded-xl px-4 py-2 text-sm" onclick="resetEventForm()">Reset</button>
    </div>
</form>
