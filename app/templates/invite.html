{% extends "base.html" %}

{% block title %}Invite Member - CalendarPlanner{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded bg-white p-6 shadow">
    <h2 class="mb-4 text-2xl font-bold">Invite Household Member</h2>

    <form id="invite-form" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium">Email Address</label>
            <input id="email" name="email" type="email" required placeholder="partner@example.com" class="mt-1 w-full rounded border border-gray-300 px-3 py-2">
        </div>

        <button type="submit" class="w-full rounded bg-blue-600 py-2 text-white hover:bg-blue-700">Send Invite</button>
    </form>

    <div id="message" class="mt-4 hidden rounded p-3 text-sm"></div>
</div>

<script>
document.getElementById('invite-form').addEventListener('submit', async (event) => {
  event.preventDefault();
  const email = document.getElementById('email').value;

  const response = await fetch('/api/users/invite', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });

  const data = await response.json();
  const message = document.getElementById('message');
  message.classList.remove('hidden');

  if (response.ok) {
    message.className = 'mt-4 rounded bg-green-100 p-3 text-sm text-green-800';
    message.textContent = data.message;
    document.getElementById('email').value = '';
  } else {
    message.className = 'mt-4 rounded bg-red-100 p-3 text-sm text-red-800';
    message.textContent = data.detail || 'Invite failed';
  }
});
</script>
{% endblock %}
